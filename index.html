                toolRegexGeneratorDesc: 'Generación automática de patrones regex a partir de ejemplos con soporte multi-idiomas'
            }
        };

        // ==================== 当前语言 ====================
        let currentLanguage = 'zh-CN';

        // ==================== 渲染工具卡片 ====================
        function renderTools() {
            const grid = document.getElementById('toolsGrid');
            grid.innerHTML = '';

            tools.forEach(tool => {
                const card = document.createElement('a');
                card.className = 'tool-card';
                card.href = tool.url;

                card.innerHTML = `
                    <div class="tool-card-icon">${tool.icon}</div>
                    <div class="tool-card-content">
                        <h3 class="tool-card-title" data-i18n="${tool.nameKey}">${t(tool.nameKey)}</h3>
                        <p class="tool-card-desc" data-i18n="${tool.descKey}">${t(tool.descKey)}</p>
                    </div>
                    <div class="tool-card-arrow">→</div>
                `;

                grid.appendChild(card);
            });
        }

        // ==================== 翻译函数 ====================
        function t(key) {
            const lang = translations[currentLanguage];
            if (lang && lang[key]) {
                return lang[key];
            }
            // 回退到中文
            return translations['zh-CN'][key] || key;
        }

        // ==================== 应用翻译 ====================
        function applyTranslations() {
            // 翻译所有带有 data-i18n 属性的元素
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                const translation = t(key);
                if (translation) {
                    el.textContent = translation;
                }
            });

            // 保存语言偏好
            localStorage.setItem('preferredLanguage', currentLanguage);
        }

        // ==================== 初始化 ====================
        function init() {
            // 加载保存的语言偏好
            const savedLanguage = localStorage.getItem('preferredLanguage');
            if (savedLanguage && translations[savedLanguage]) {
                currentLanguage = savedLanguage;
                document.getElementById('languageSelect').value = savedLanguage;
            }

            // 渲染工具卡片
            renderTools();

            // 应用翻译
            applyTranslations();

            // 语言选择器事件监听
            document.getElementById('languageSelect').addEventListener('change', (e) => {
                currentLanguage = e.target.value;
                applyTranslations();
            });
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', init);
    </script>
